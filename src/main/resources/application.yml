spring:
  application:
    name: NeoflexHomeworkTroubleshooting

  datasource:
    url: jdbc:h2:mem:productsdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true

  observations:
    annotations:
      enabled: true